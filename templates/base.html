<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Suspicious URL Analyzer{% endblock %}</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #334155;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
        }
        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 640px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-wide {
            max-width: 1200px;
            align-self: flex-start;
        }
        h2 { margin-top: 0; font-size: 1.5rem; }
        p { color: var(--muted); line-height: 1.5; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="url"], input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            background: #0f172a;
            color: var(--text);
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        button, .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover, .btn:hover { opacity: 0.9; }
        button:active, .btn:active { transform: translateY(1px); }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: #0f172a; }
        .btn-warning { background: var(--warning); color: #0f172a; }
        .btn-secondary { background: #334155; color: var(--text); }
        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        .info-item { background: #0f172a; padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; }
        .info-item .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
        .info-item .value { font-size: 1.125rem; font-weight: 600; margin-top: 0.25rem; word-break: break-all; }
        .timer { font-variant-numeric: tabular-nums; }
        .timer-warning { color: var(--warning); }
        .timer-danger { color: var(--danger); }
        iframe {
            width: 100%;
            height: 720px;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #000;
        }
        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 2rem;
            color: var(--muted);
        }
        .spinner {
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid #334155;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid #334155; }
        th { color: var(--muted); font-weight: 500; width: 35%; }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-success { background: rgba(34,197,94,0.15); color: #86efac; }
        .badge-warning { background: rgba(245,158,11,0.15); color: #fde68a; }
        .badge-danger { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .badge-info { background: rgba(56,189,248,0.15); color: #7dd3fc; }
        @media (max-width: 640px) {
            .info-grid { grid-template-columns: 1fr; }
            iframe { height: 480px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <h1>🔒 Suspicious URL Analyzer</h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
